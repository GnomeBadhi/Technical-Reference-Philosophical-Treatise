<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Kernel Cockpit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <div id="cockpit">

        <!-- CHAT TERMINAL -->
        <section id="terminal">
            <div id="terminal-output"></div>
            <input id="terminal-input" type="text" placeholder="Type…" autocomplete="off">
        </section>

        <!-- KERNEL STATE PANEL -->
        <section id="state-panel">
            <h2>Kernel State</h2>
            <pre id="state-json"></pre>
        </section>

        <!-- VISUALIZATION PANEL -->
        <section id="visuals">
            <div class="viz-block">
                <h2>2D Affect Field</h2>
                <canvas id="viz-2d"></canvas>
            </div>

            <div class="viz-block">
                <h2>Kernel State Space (S, L)</h2>
                <canvas id="viz-3d"></canvas>
            </div>
        </section>

    </div>

    <!-- SCRIPT ORDER MATTERS -->
    <script src="Memory.js"></script>
    <script src="Kernel.js"></script>
    <script src="Visualizer.js"></script>
    <script src="UI.js"></script>
</body>
</html>
