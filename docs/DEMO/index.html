<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Sovereign Kernel — Bridge Interface</title>
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <div id="header">
        <div class="hdr-left">◈ S.S. SOVEREIGN &nbsp;·&nbsp; KERNEL vC5.3</div>
        <div class="hdr-center">BRIDGE INTERFACE</div>
        <div class="hdr-right"><span class="blink">●</span>&nbsp;OPERATIONAL</div>
    </div>

    <div id="layout">

        <!-- Left Navigation Panel -->
        <nav id="nav-left" class="nav-panel">
            <div class="panel-label">◤ PRIMITIVE SCAN</div>
            <canvas id="canvas2d"></canvas>
            <div class="panel-label" style="margin-top:10px">◤ SYSTEM STATUS</div>
            <div id="state-bars"></div>
        </nav>

        <!-- Center: SOVA AI Chat -->
        <main id="chat-panel">
            <div id="chat-messages"></div>
            <div id="chat-input-row">
                <button id="mic-btn" class="icon-btn" title="Voice input — hold or click to speak">◉</button>
                <span class="prompt-glyph">›</span>
                <input id="chat-input" type="text" placeholder="Speak to SOVA…" autocomplete="off" spellcheck="false" autofocus>
                <button id="voice-toggle" class="icon-btn active" title="Toggle SOVA voice output">◈</button>
            </div>
        </main>

        <!-- Right Navigation Panel -->
        <nav id="nav-right" class="nav-panel">
            <div class="panel-label">◤ ORBITAL MAP</div>
            <canvas id="webgl-canvas"></canvas>
            <div class="panel-label" style="margin-top:10px">◤ OPERATOR LOG</div>
            <div id="op-log"></div>
        </nav>

    </div>

    <script src="Kernel.js"></script>
    <script src="Visualizer.js"></script>
    <script src="UI.js"></script>
</body>
</html>
