<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sovereign Kernel Cockpit</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="Style.css">
</head>

<body>
    <div id="cockpit">

        <!-- CHAT TERMINAL -->
        <section id="terminal">
            <div id="terminal-output"></div>
            <input id="terminal-input" type="text" placeholder="Type…" autocomplete="off">
            <div id="voice-controls">
                <button id="btn-mic"  title="Start voice input">🎤</button>
                <button id="btn-tts"  title="Mute voice output">🔊</button>
                <span   id="voice-label"></span>
            </div>
            <div id="hint-bar">
                <span class="hint">how am i</span>
                <span class="hint">status</span>
                <span class="hint">reflect</span>
                <span class="hint">overwhelmed</span>
                <span class="hint">stuck</span>
                <span class="hint">what are you</span>
            </div>
        </section>

        <!-- KERNEL STATE PANEL -->
        <section id="state-panel">
            <h2>Kernel State <span id="regime-badge"></span></h2>
            <div id="primitives-grid"></div>

            <div id="txt-state-section">
                <div id="txt-state-header">Text Domain <span id="txt-regime-badge"></span></div>
                <div id="txt-primitives-grid"></div>
            </div>

            <details id="state-raw">
                <summary>Raw JSON</summary>
                <pre id="state-json"></pre>
            </details>
        </section>

        <!-- VISUALIZATION PANEL -->
        <section id="visuals">
            <div class="viz-block">
                <h2>2D Affect Field</h2>
                <canvas id="viz-2d"></canvas>
            </div>

            <div class="viz-block">
                <h2>Kernel State Space (S, L)</h2>
                <canvas id="viz-3d"></canvas>
            </div>
        </section>

    </div>

    <!-- SCRIPT ORDER MATTERS -->
    <script src="Memory.js"></script>
    <script src="Kernel.js"></script>
    <script src="TextKernel.js"></script>
    <script src="Visualizer.js"></script>
    <script src="UI.js"></script>
    <script src="Voice.js"></script>
</body>
</html>
